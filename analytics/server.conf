server {
    listen 443 ssl;
    server_name semesterhub.pages.dev;
    
    server_tokens off;
    
    location /analytics/client.js {
        alias /var/www/site/analytics/client.js;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "POST, GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type";
    }
    
    location /api/analytics {
        proxy_pass http://localhost:3000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        access_log /var/log/nginx/analytics.log;
    }
    
    location /track.gif {
        empty_gif;
        add_header Last-Modified "Mon, 01 Jan 2024 00:00:00 GMT";
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        access_log /var/log/nginx/pixel.log;
        proxy_pass http://localhost:3001/track.gif;
    }
}