<svg viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" preserveAspectRatio="xMidYMid meet" font-family="ui-monospace, 'Courier New', Courier, monospace">
  <title id="t">SemesterHub</title>
  <desc id="d">SemesterHub — your entire semester, one brutal hub. A neobrutalist resource hub for university students.</desc>

  <style>
    /* Motion only — all colour/geometry lives in attributes so it renders everywhere. */
    @keyframes pop {
      0%   { transform: translateY(28px); opacity: 0; }
      65%  { transform: translateY(-5px); opacity: 1; }
      100% { transform: translateY(0);    opacity: 1; }
    }
    @keyframes floatUp { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    @keyframes bobA    { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-11px); } }
    @keyframes bobB    { 0%,100% { transform: translateY(0); } 50% { transform: translateY(9px); } }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-1180px); } }
    @keyframes blink   { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }

    .card  { animation: pop .7s cubic-bezier(.2,.85,.25,1.15) both, floatUp 4.6s ease-in-out .7s infinite; }
    .cubeL { animation: pop .7s cubic-bezier(.2,.85,.25,1.15) .12s both; }
    .cubeR { animation: pop .7s cubic-bezier(.2,.85,.25,1.15) .22s both; }
    .cubeS { animation: pop .7s cubic-bezier(.2,.85,.25,1.15) .30s both; }
    .bobA  { animation: bobA 3.4s ease-in-out .9s infinite; }
    .bobB  { animation: bobB 4.1s ease-in-out 1.0s infinite; }
    .bobC  { animation: bobA 3.0s ease-in-out 1.1s infinite; }
    .roll  { animation: marquee 20s linear infinite; }
    .cursor{ animation: blink 1.05s steps(1) infinite; }
    .eyebrow { animation: pop .7s cubic-bezier(.2,.85,.25,1.15) .05s both; }
    .tag     { animation: pop .7s cubic-bezier(.2,.85,.25,1.15) .35s both; }

    @media (prefers-reduced-motion: reduce) {
      .card,.cubeL,.cubeR,.cubeS,.bobA,.bobB,.bobC,.roll,.cursor,.eyebrow,.tag { animation: none !important; }
    }
  </style>

  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.7" fill="#1A1410" opacity="0.10"/>
    </pattern>
    <clipPath id="tickerClip"><rect x="18" y="320" width="1164" height="46"/></clipPath>
  </defs>

  <!-- Paper background -->
  <rect x="0" y="0" width="1200" height="380" fill="#FDF3E3"/>
  <rect x="18" y="18" width="1164" height="344" fill="url(#dots)"/>
  <!-- Thick neobrutalist frame -->
  <rect x="9" y="9" width="1182" height="362" fill="none" stroke="#1A1410" stroke-width="10"/>

  <!-- Isometric 3D cube, left -->
  <g class="cubeL" transform="translate(100,150)">
    <g class="bobA">
      <path d="M -36,0 L 0,-18 L 36,0 L 0,18 Z" fill="#FFC65C" stroke="#1A1410" stroke-width="4" stroke-linejoin="miter"/>
      <path d="M -36,0 L 0,18 L 0,58 L -36,40 Z" fill="#FF9F1C" stroke="#1A1410" stroke-width="4" stroke-linejoin="miter"/>
      <path d="M 36,0 L 0,18 L 0,58 L 36,40 Z" fill="#E07B00" stroke="#1A1410" stroke-width="4" stroke-linejoin="miter"/>
    </g>
  </g>

  <!-- Isometric 3D cube, right (bigger) -->
  <g class="cubeR" transform="translate(1098,148) scale(1.18)">
    <g class="bobB">
      <path d="M -36,0 L 0,-18 L 36,0 L 0,18 Z" fill="#FFC65C" stroke="#1A1410" stroke-width="3.5" stroke-linejoin="miter"/>
      <path d="M -36,0 L 0,18 L 0,58 L -36,40 Z" fill="#FF9F1C" stroke="#1A1410" stroke-width="3.5" stroke-linejoin="miter"/>
      <path d="M 36,0 L 0,18 L 0,58 L 36,40 Z" fill="#E07B00" stroke="#1A1410" stroke-width="3.5" stroke-linejoin="miter"/>
    </g>
  </g>

  <!-- Small accent cube, lower-right -->
  <g class="cubeS" transform="translate(1052,256) scale(0.6)">
    <g class="bobC">
      <path d="M -36,0 L 0,-18 L 36,0 L 0,18 Z" fill="#FFC65C" stroke="#1A1410" stroke-width="6" stroke-linejoin="miter"/>
      <path d="M -36,0 L 0,18 L 0,58 L -36,40 Z" fill="#FF9F1C" stroke="#1A1410" stroke-width="6" stroke-linejoin="miter"/>
      <path d="M 36,0 L 0,18 L 0,58 L 36,40 Z" fill="#E07B00" stroke="#1A1410" stroke-width="6" stroke-linejoin="miter"/>
    </g>
  </g>

  <!-- Eyebrow label -->
  <text class="eyebrow" x="600" y="74" text-anchor="middle" font-size="20" font-weight="700"
        letter-spacing="6" fill="#1A1410" opacity="0.85">// SHOOLINI · BYTEXL · BATCH 2025—29</text>

  <!-- Hero card with hard offset shadow -->
  <g class="card">
    <rect x="207" y="122" width="786" height="132" fill="#1A1410"/>
    <rect x="195" y="110" width="786" height="132" fill="#FF9F1C" stroke="#1A1410" stroke-width="9"/>
    <text x="588" y="200" text-anchor="middle" font-size="82" font-weight="900"
          letter-spacing="1" fill="#1A1410"
          font-family="'Arial Black', 'Arial Narrow', Arial, sans-serif">SEMESTERHUB</text>
  </g>

  <!-- Tagline + blinking cursor -->
  <text class="tag" x="600" y="296" text-anchor="middle" font-size="23" font-weight="700"
        letter-spacing="3" fill="#1A1410">YOUR ENTIRE SEMESTER &#9670; ONE BRUTAL HUB<tspan class="cursor" dx="4" font-weight="900">_</tspan></text>

  <!-- Scrolling ticker -->
  <rect x="18" y="320" width="1164" height="46" fill="#1A1410"/>
  <g clip-path="url(#tickerClip)">
    <g class="roll">
      <text x="30" y="351" font-size="20" font-weight="700" letter-spacing="2" fill="#FF9F1C"
            textLength="1180" lengthAdjust="spacingAndGlyphs">SYLLABUS &#10022; NOTES &#10022; PAST PAPERS &#10022; LAB PRACTICALS &#10022; PROJECTS &#10022; CHEAT SHEETS &#10022; PANIC CHAT &#10022;</text>
      <text x="1210" y="351" font-size="20" font-weight="700" letter-spacing="2" fill="#FF9F1C"
            textLength="1180" lengthAdjust="spacingAndGlyphs">SYLLABUS &#10022; NOTES &#10022; PAST PAPERS &#10022; LAB PRACTICALS &#10022; PROJECTS &#10022; CHEAT SHEETS &#10022; PANIC CHAT &#10022;</text>
    </g>
  </g>
</svg>
